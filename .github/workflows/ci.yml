name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist/coolercontrol-truenas-bridge-linux-amd64
          cp target/release/coolercontrol-truenas-bridge dist/coolercontrol-truenas-bridge-linux-amd64/
          cp plugin-files/manifest.toml dist/coolercontrol-truenas-bridge-linux-amd64/
          cp plugin-files/config-example.json dist/coolercontrol-truenas-bridge-linux-amd64/
          tar -C dist -czf dist/coolercontrol-truenas-bridge-linux-amd64.tar.gz coolercontrol-truenas-bridge-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: coolercontrol-truenas-bridge-linux-amd64
          path: dist/coolercontrol-truenas-bridge-linux-amd64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
